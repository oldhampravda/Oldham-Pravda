<!DOCTYPE html>
<html>
<head>
<title>Oldham Pravda</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#071b33;color:white;font-family:Arial}
header{padding:30px;background:#06172b;border-bottom:4px solid #c9a45d}
h1{color:#c9a45d;font-size:46px;margin:0}
nav{padding:15px;background:#0d2747}
nav a{color:white;margin-right:20px;text-decoration:none;font-weight:bold}
.breaking{background:#c9a45d;color:#071b33;padding:12px;font-weight:bold}
.container{padding:20px;max-width:1000px;margin:auto}
.article{background:#102b4d;border:1px solid #c9a45d;margin-bottom:20px;padding:20px}
.article h2{color:#c9a45d;margin-top:0}
.meta{color:#ccc;font-size:14px}
button{background:#c9a45d;color:#071b33;padding:12px;border:0;font-weight:bold}
</style>
</head>
<body>

<div class="breaking">BREAKING NEWS • INDEPENDENT LOCAL REPORTING FROM OLDHAM</div>

<header>
<h1>OLDHAM PRAVDA</h1>
<p>NEWS • TRUTH • JUSTICE</p>
</header>

<nav>
<a href="index.html">Home</a>

<a href="submit.html">Submit Story</a>
</nav>

<div class="container">
<h2>Latest Stories</h2>
<div id="articles">Loading articles...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://qdtjsvahswbpsdoikquf.supabase.co";
const supabaseKey = "sb_publishable_5goegCu4fBGEffw37oxTPg_wxOsazcS";
const db = supabase.createClient(supabaseUrl, supabaseKey);

async function loadArticles(){
  const { data, error } = await db
    .from("articles")
    .select("*")
    .order("created_at", { ascending: false });

  const box = document.getElementById("articles");

  if(error){
    box.innerHTML = "Error loading articles: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    box.innerHTML = "No articles published yet.";
    return;
  }

  box.innerHTML = data.map(a => `
    <div class="article">
      ${a.image ? `<img src="${a.image}" style="width:100%;max-height:300px;object-fit:cover;">` : ""}
      <p class="meta">${a.category || "News"} • ${a.author || "Oldham Pravda"}</p>
      <h2>${a.title}</h2>
      <p>${(a.content || "").replace(/\n/g,"<br>")}</p>
    </div>
  `).join("");
}

loadArticles();
</script>

</body>
</html>
