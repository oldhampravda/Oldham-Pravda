<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Article Builder | Oldham Pravda</title><link rel="stylesheet" href="style.css"></head><body><header class="top"><div class="brand"><img src="assets/images/logo.jpg" alt="Oldham Pravda logo"><div><h1>Oldham Pravda</h1><p>Article Builder</p></div></div><nav><a href="index.html">Home</a><a href="submit.html">Submit a Story</a></nav></header><main><section class="panel"><h2>Article Builder</h2><p>Type the article here. Press generate. Copy the result into a new GitHub file inside the <strong>articles</strong> folder. It is not glamorous, but neither is local government.</p><label>Article title</label><input id="title" placeholder="Example: Oldham Council faces fresh questions"><label>Category</label><input id="cat" placeholder="Council Watch"><label>Author</label><input id="author" value="Oldham Pravda"><label>Article text</label><textarea id="body" rows="10" placeholder="Write or paste the article here"></textarea><button class="button" onclick="makeArticle()">Generate Article Code</button><h3>Copy this code</h3><pre class="output" id="out"></pre></section></main><script>function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}function makeArticle(){let t=document.getElementById('title').value||'Untitled';let c=document.getElementById('cat').value||'News';let a=document.getElementById('author').value||'Oldham Pravda';let b=document.getElementById('body').value||'';let paras=b.split(/\n+/).filter(Boolean).map(x=>'<p>'+esc(x)+'</p>').join('\n');let html='<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>'+esc(t)+'</title><link rel="stylesheet" href="../style.css"></head><body><header class="top"><div class="brand"><img src="../assets/images/logo.jpg" alt="Oldham Pravda logo"><div><h1>Oldham Pravda</h1><p>News • Truth • Justice</p></div></div><nav><a href="../index.html">Home</a><a href="../builder.html">Article Builder</a></nav></header><main><article class="panel"><p class="tag">'+esc(c)+'</p><h2>'+esc(t)+'</h2><p><strong>By '+esc(a)+'</strong></p>'+paras+'</article></main><footer><p>© Oldham Pravda.</p></footer></body></html>';document.getElementById('out').textContent='File name: '+slug(t)+'.html\n\n'+html}</script></body></html>
