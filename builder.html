<!DOCTYPE html>
<html>
<head>
<title>Oldham Pravda Publisher</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{background:#071b33;color:white;font-family:Arial;padding:20px}
h1{color:#c9a45d}
input,textarea,select{width:100%;padding:12px;margin:8px 0;background:#102b4d;color:white;border:1px solid #c9a45d}
button{background:#c9a45d;color:#071b33;padding:14px;font-weight:bold;border:0}
</style>
</head>
<body>

<h1>Oldham Pravda Publisher</h1>

<input id="title" placeholder="Headline">
<select id="category">
<option>Council Watch</option>
<option>Housing</option>
<option>Crime</option>
<option>Opinion</option>
<option>Local Business</option>
</select>
<input id="author" value="Oldham Pravda">
<input id="image" placeholder="Image URL optional">
<textarea id="content" rows="14" placeholder="Paste story here"></textarea>

<button onclick="publishArticle()">Publish Article</button>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://qdtjsvahswbpsdoikquf.supabase.co";
const supabaseKey = "sb_publishable_5goegCu4fBGEffw37oxTPg_wxOsazcS";
const db = supabase.createClient(supabaseUrl, supabaseKey);

async function publishArticle(){
  const article = {
Title: document.getElementById("title").value,
Category: document.getElementById("category").value,
Auther: document.getElementById("author").value,
Image: document.getElementById("image").value,
Content: document.getElementById("content").value
  };

  const { error } = await db.from("articles").insert([article]);

  if(error){
    document.getElementById("status").innerText = "Error: " + error.message;
  } else {
    document.getElementById("status").innerText = "Article published.";
  }
}
</script>

</body>
</html>
